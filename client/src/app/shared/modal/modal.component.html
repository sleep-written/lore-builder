<h2 mat-dialog-title>{{ this.options.title }}</h2>

<mat-dialog-content>
    <div class="icon">
        <mat-icon>{{ this.options.icon }}</mat-icon>
    </div>

    <div class="text">
        {{ this.options.text }}
    </div>
</mat-dialog-content>

<mat-dialog-actions *ngIf="this.options.buttons.length > 0">
    @for (button of this.options.buttons; track $index) {
        <button mat-raised-button
        type="button"
        [color]="button.color"
        (click)="this.onButtonClick(button)">
            <mat-icon>{{ button.icon }}</mat-icon>
            <span>{{ button.text }}</span>
        </button>
    }
</mat-dialog-actions>
