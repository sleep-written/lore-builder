<form
[formGroup]="this.form">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Story</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <mat-form-field>
                <mat-label>Title</mat-label>
                <input matInput appTrim
                formControlName="title"
                [autocomplete]="false" />

                <mat-hint>The name of your story</mat-hint>
                <mat-error>Required</mat-error>
            </mat-form-field>
            
            <mat-form-field>
                <mat-label>Description</mat-label>
                <textarea matInput appTrim
                formControlName="description"
                [rows]="4">
                </textarea>

                <mat-hint>The name of your story</mat-hint>
                <mat-error>Required</mat-error>
            </mat-form-field>
        </mat-card-content>

        <mat-card-actions>
            <button mat-raised-button
            type="button"
            color="accent"
            [disabled]="this.form.invalid || this.form.pristine">
                <i class="fa-solid fa-floppy-disk"></i>
                <span>Save</span>
            </button>
            
            <button mat-raised-button
            type="button"
            color="primary"
            [disabled]="this.form.pristine"
            (click)="this.form.reset()">
                <i class="fa-solid fa-arrow-rotate-left"></i>
                <span>Reset</span>
            </button>
        </mat-card-actions>
    </mat-card>
</form>
