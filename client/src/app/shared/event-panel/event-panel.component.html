<form
[formGroup]="this.form">
    <mat-card>
        <mat-card-content>
            <mat-form-field>
                <mat-label>Title</mat-label>
                <input matInput
                type="text"
                autocomplete="off"
                formControlName="title" />

                <mat-hint>The name of the event</mat-hint>
            </mat-form-field>

            <mat-form-field>
                <mat-label>Description</mat-label>
                <textarea matInput
                formControlName="description"
                [rows]="6"
                [style.resizable]="'none'">
                </textarea>
            </mat-form-field>
        </mat-card-content>
    </mat-card>
</form>
